<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">AetherOS Control Panel preview</title>
  <desc id="desc">A dark advanced system control panel with device manager, boot targets, services, drivers, recovery, and update health.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09111e"/>
      <stop offset="1" stop-color="#12142a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#42f58d"/>
      <stop offset="1" stop-color="#7b61ff"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="56" y="48" width="1168" height="664" rx="18" fill="#0c1322" stroke="#263a63"/>
  <text x="92" y="102" fill="#f5f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="800">Aether Control Panel</text>
  <text x="92" y="132" fill="#9fb0cc" font-family="Segoe UI, Arial, sans-serif" font-size="15">Advanced startup, device state, service health, recovery, policy, and package repair.</text>
  <rect x="934" y="78" width="242" height="38" rx="10" fill="#101a2c" stroke="#345080"/>
  <text x="956" y="102" fill="#dce7ff" font-family="Segoe UI, Arial, sans-serif" font-size="14">Search system tools</text>

  <rect x="92" y="166" width="220" height="494" rx="12" fill="#101a2c" stroke="#263a63"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="15">
    <rect x="112" y="190" width="180" height="38" rx="9" fill="#17284a"/>
    <text x="134" y="215" fill="#eaf0ff" font-weight="700">System</text>
    <text x="134" y="267" fill="#a8b8d6">Devices</text>
    <text x="134" y="314" fill="#a8b8d6">Services</text>
    <text x="134" y="361" fill="#a8b8d6">Registry</text>
    <text x="134" y="408" fill="#a8b8d6">Security</text>
    <text x="134" y="455" fill="#a8b8d6">Recovery</text>
    <text x="134" y="502" fill="#a8b8d6">Updates</text>
    <text x="134" y="549" fill="#a8b8d6">Developer</text>
  </g>

  <g>
    <rect x="348" y="166" width="252" height="142" rx="12" fill="#101a2c" stroke="#263a63"/>
    <text x="374" y="204" fill="#f5f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Boot Manager</text>
    <text x="374" y="235" fill="#9fb0cc" font-family="Segoe UI, Arial, sans-serif" font-size="13">Normal boot selected</text>
    <rect x="374" y="258" width="122" height="28" rx="8" fill="url(#accent)"/>
    <text x="395" y="277" fill="#06111f" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="800">Plan boot</text>

    <rect x="626" y="166" width="252" height="142" rx="12" fill="#101a2c" stroke="#263a63"/>
    <text x="652" y="204" fill="#f5f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Device Manager</text>
    <text x="652" y="235" fill="#9fb0cc" font-family="Segoe UI, Arial, sans-serif" font-size="13">18 devices, 0 blocked</text>
    <text x="652" y="270" fill="#42f58d" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700">Driver profile: stable</text>

    <rect x="904" y="166" width="252" height="142" rx="12" fill="#101a2c" stroke="#263a63"/>
    <text x="930" y="204" fill="#f5f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">Security Baseline</text>
    <text x="930" y="235" fill="#9fb0cc" font-family="Segoe UI, Arial, sans-serif" font-size="13">Hardening score</text>
    <text x="930" y="282" fill="#42f58d" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="800">94</text>
  </g>

  <rect x="348" y="342" width="808" height="318" rx="12" fill="#101a2c" stroke="#263a63"/>
  <text x="374" y="384" fill="#f5f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Service Health</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="14">
    <text x="374" y="430" fill="#9fb0cc">Service</text>
    <text x="596" y="430" fill="#9fb0cc">State</text>
    <text x="776" y="430" fill="#9fb0cc">Policy</text>
    <text x="956" y="430" fill="#9fb0cc">Health</text>
    <line x1="374" y1="446" x2="1124" y2="446" stroke="#263a63"/>
    <text x="374" y="484" fill="#eaf0ff">aether-hardeningd</text>
    <text x="596" y="484" fill="#42f58d">running</text>
    <text x="776" y="484" fill="#dce7ff">always</text>
    <text x="956" y="484" fill="#42f58d">healthy</text>
    <text x="374" y="530" fill="#eaf0ff">aether-updated</text>
    <text x="596" y="530" fill="#42f58d">running</text>
    <text x="776" y="530" fill="#dce7ff">on-demand</text>
    <text x="956" y="530" fill="#42f58d">healthy</text>
    <text x="374" y="576" fill="#eaf0ff">aether-recoveryd</text>
    <text x="596" y="576" fill="#42f58d">running</text>
    <text x="776" y="576" fill="#dce7ff">always</text>
    <text x="956" y="576" fill="#42f58d">healthy</text>
    <text x="374" y="622" fill="#eaf0ff">aether-ecosystemd</text>
    <text x="596" y="622" fill="#42f58d">running</text>
    <text x="776" y="622" fill="#dce7ff">restart</text>
    <text x="956" y="622" fill="#42f58d">healthy</text>
  </g>
</svg>
