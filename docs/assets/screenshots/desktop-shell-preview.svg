    <rect x="820" y="156" width="340" height="44" rx="10" fill="#151a35"/>
    <text x="844" y="184" fill="#eaf0ff" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Aether Terminal</text>
    <text x="846" y="230" fill="#42f58d" font-family="Consolas, monospace" font-size="14">aether&gt; sysinfo</text>
    <text x="846" y="260" fill="#cbd6ef" font-family="Consolas, monospace" font-size="14">CPU 18%  RAM 42%  Disk 61%</text>
