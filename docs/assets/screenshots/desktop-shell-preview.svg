<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">AetherOS desktop shell preview</title>
  <desc id="desc">A dark operating-system-style desktop shell with status bar, dock, launcher, windows, and system widgets.</desc>
  <defs>
    <linearGradient id="wallpaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.48" stop-color="#0d1628"/>
      <stop offset="1" stop-color="#141026"/>
    </linearGradient>
    <linearGradient id="portal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#41f6b7"/>
      <stop offset="0.52" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#9b5cff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000814" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1280" height="760" fill="url(#wallpaper)"/>
  <circle cx="1030" cy="110" r="230" fill="#1e2e58" opacity="0.24"/>
  <circle cx="280" cy="560" r="270" fill="#342062" opacity="0.2"/>

  <rect x="0" y="0" width="1280" height="46" fill="#080d17"/>
  <text x="26" y="29" fill="#eaf0ff" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">AetherOS</text>
  <text x="545" y="29" fill="#9fb0cc" font-family="Segoe UI, Arial, sans-serif" font-size="14">Workspace 1 - Development</text>
  <text x="1052" y="29" fill="#9fb0cc" font-family="Segoe UI, Arial, sans-serif" font-size="14">Wi-Fi</text>
  <text x="1110" y="29" fill="#9fb0cc" font-family="Segoe UI, Arial, sans-serif" font-size="14">94%</text>
  <text x="1165" y="29" fill="#eaf0ff" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">12:04 PM</text>

  <g transform="translate(54 92)">
    <rect width="86" height="86" rx="16" fill="#111a2b" stroke="#263a63"/>
    <path d="M43 17 L69 69 H56 L51 58 H34 L29 69 H17 L43 17 Z" fill="#f5f7ff"/>
    <ellipse cx="43" cy="45" rx="9" ry="18" fill="url(#portal)"/>
