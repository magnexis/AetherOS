  <rect x="462" y="690" width="18" height="18" rx="4" fill="#7ab6ff"/>
  <path d="M528 686 h10 l10 10 v16 h-20z" fill="#9b5cff"/>
  <circle cx="591" cy="699" r="12" fill="#42f58d"/>
  <rect x="641" y="691" width="20" height="16" rx="4" fill="#ffc857"/>
