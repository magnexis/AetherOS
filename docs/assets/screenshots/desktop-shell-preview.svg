    <text x="436" y="266" fill="#dce7ff" font-family="Segoe UI, Arial, sans-serif" font-size="13">Aether SDK</text>
    <text x="610" y="266" fill="#dce7ff" font-family="Segoe UI, Arial, sans-serif" font-size="13">Kernel Lab</text>
    <text x="436" y="360" fill="#dce7ff" font-family="Segoe UI, Arial, sans-serif" font-size="13">Release Notes</text>
    <text x="610" y="360" fill="#dce7ff" font-family="Segoe UI, Arial, sans-serif" font-size="13">Packages</text>
  </g>

  <g filter="url(#shadow)">
