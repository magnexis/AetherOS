<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">AetherOS ecosystem and security preview</title>
  <desc id="desc">A dark marketplace and security dashboard showing app catalog, publishers, extension points, hardening controls, and Shield status.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.5" stop-color="#101a2c"/>
      <stop offset="1" stop-color="#17122b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#9b5cff"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="760" fill="url(#bg)"/>
  <text x="70" y="86" fill="#f5f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="32" font-weight="800">Aether Ecosystem Hub</text>
  <text x="70" y="118" fill="#9fb0cc" font-family="Segoe UI, Arial, sans-serif" font-size="15">Marketplace, SDK, runtime permissions, signed package policy, and security posture.</text>
  <rect x="70" y="150" width="1140" height="54" rx="14" fill="#0c1322" stroke="#263a63"/>
  <text x="98" y="184" fill="#dce7ff" font-family="Segoe UI, Arial, sans-serif" font-size="15">Search apps, commands, packages, settings, services, and files...</text>

  <g>
    <rect x="70" y="236" width="240" height="128" rx="14" fill="#0c1322" stroke="#263a63"/>
    <text x="98" y="277" fill="#9fb0cc" font-family="Segoe UI, Arial, sans-serif" font-size="14">Catalog Apps</text>
    <text x="98" y="328" fill="#f5f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="800">360</text>
    <rect x="342" y="236" width="240" height="128" rx="14" fill="#0c1322" stroke="#263a63"/>
    <text x="370" y="277" fill="#9fb0cc" font-family="Segoe UI, Arial, sans-serif" font-size="14">Publishers</text>
    <text x="370" y="328" fill="#f5f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="800">90</text>
    <rect x="614" y="236" width="240" height="128" rx="14" fill="#0c1322" stroke="#263a63"/>
    <text x="642" y="277" fill="#9fb0cc" font-family="Segoe UI, Arial, sans-serif" font-size="14">Extension Points</text>
    <text x="642" y="328" fill="#f5f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="800">80</text>
    <rect x="886" y="236" width="324" height="128" rx="14" fill="#0c1322" stroke="#263a63"/>
    <text x="914" y="277" fill="#9fb0cc" font-family="Segoe UI, Arial, sans-serif" font-size="14">Readiness Score</text>
    <text x="914" y="328" fill="#42f58d" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="800">94</text>
  </g>

  <rect x="70" y="396" width="536" height="268" rx="14" fill="#0c1322" stroke="#263a63"/>
  <text x="98" y="438" fill="#f5f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Featured Store Apps</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="14">
    <rect x="98" y="468" width="210" height="62" rx="10" fill="#111c30" stroke="#263a63"/>
    <text x="122" y="494" fill="#eaf0ff" font-weight="700">Aether Studio</text>
    <text x="122" y="516" fill="#9fb0cc">verified - stable</text>
    <rect x="332" y="468" width="210" height="62" rx="10" fill="#111c30" stroke="#263a63"/>
    <text x="356" y="494" fill="#eaf0ff" font-weight="700">Package Forge</text>
    <text x="356" y="516" fill="#9fb0cc">signed - beta</text>
    <rect x="98" y="552" width="210" height="62" rx="10" fill="#111c30" stroke="#263a63"/>
    <text x="122" y="578" fill="#eaf0ff" font-weight="700">Window Lab</text>
    <text x="122" y="600" fill="#9fb0cc">runtime APIs</text>
    <rect x="332" y="552" width="210" height="62" rx="10" fill="#111c30" stroke="#263a63"/>
    <text x="356" y="578" fill="#eaf0ff" font-weight="700">Shield Rules</text>
    <text x="356" y="600" fill="#9fb0cc">security pack</text>
  </g>

  <rect x="642" y="396" width="568" height="268" rx="14" fill="#0c1322" stroke="#263a63"/>
  <text x="670" y="438" fill="#f5f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="800">Security Hardening</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="14">
    <text x="670" y="482" fill="#42f58d">enforced</text>
    <text x="766" y="482" fill="#eaf0ff">Least privilege app permissions</text>
    <text x="670" y="522" fill="#42f58d">enforced</text>
    <text x="766" y="522" fill="#eaf0ff">Driver signature policy</text>
    <text x="670" y="562" fill="#42f58d">enforced</text>
    <text x="766" y="562" fill="#eaf0ff">Audit privileged actions</text>
    <text x="670" y="602" fill="#ffc857">warn</text>
    <text x="766" y="602" fill="#eaf0ff">Signed Store artifacts</text>
  </g>
  <rect x="982" y="458" width="150" height="150" rx="75" fill="#111c30" stroke="#345080" stroke-width="8"/>
  <path d="M1057 485 a48 48 0 1 1-1 0" fill="none" stroke="url(#accent)" stroke-width="12" stroke-linecap="round"/>
  <text x="1057" y="545" text-anchor="middle" fill="#f5f7ff" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="800">94</text>
  <text x="1057" y="574" text-anchor="middle" fill="#9fb0cc" font-family="Segoe UI, Arial, sans-serif" font-size="13">secure baseline</text>
</svg>
